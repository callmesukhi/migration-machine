name: pages

on:
  push:
    branches: [ main ]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Production deploy pushes the built site to the gh-pages branch.
# (Set Pages source to "Deploy from a branch" -> gh-pages -> / root.)
permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy site/ to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: site
          branch: gh-pages
          # Wipe stale production files, but never the in-flight PR previews
          # that pr-preview-action keeps under pr-preview/.
          clean: true
          clean-exclude: |
            pr-preview/

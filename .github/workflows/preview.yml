name: pr-preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'site/**'

# Deploy each PR's site/ into pr-preview/pr-<N>/ on gh-pages and comment the URL.
# Cleanup happens automatically when the PR is closed.
permissions:
  contents: write
  pull-requests: write

concurrency: preview-${{ github.ref }}

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy, update, or remove the PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./site/

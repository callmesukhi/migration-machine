name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  tests:
    name: engine tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run engine tests
        run: bash tests/run.sh

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint shell
        # Gate on warnings and errors. Info/style notes (e.g. the A && B || C
        # idiom, SC2015) are intentionally allowed via --severity=warning.
        run: shellcheck --severity=warning migrate lib/*.sh steps/*.sh tests/*.sh tests/fixtures/steps/*.sh
